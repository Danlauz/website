name: Publier le site Quarto

on:
  push:
    branches: [main]
  schedule:
    # Tous les lundis à 06:00 UTC : rafraîchit les publications depuis ORCID
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Mettre à jour les publications depuis ORCID
        continue-on-error: true
        run: python publications/generate_publications_orcid.py

      - name: Générer le CV PDF
        continue-on-error: true
        run: |
          python -m pip install --quiet reportlab
          python assets/generate_cv.py

      - name: Installer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Rendre le site
        run: quarto render

      - name: Téléverser l'artéfact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
